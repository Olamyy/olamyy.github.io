{% set share_url = page.canonical_url %}
{% set share_title = page.title | striptags %}

<div class="share-bar">
  <span class="share-label">Share</span>
  <a class="share-link"
     href="https://twitter.com/intent/tweet?url={{ share_url | urlencode }}&text={{ share_title | urlencode }}"
     target="_blank" rel="noopener" title="Share on X">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  </a>
  <a class="share-link"
     href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url | urlencode }}"
     target="_blank" rel="noopener" title="Share on LinkedIn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
  </a>
  <a class="share-link"
     href="https://news.ycombinator.com/submitlink?u={{ share_url | urlencode }}&t={{ share_title | urlencode }}"
     target="_blank" rel="noopener" title="Share on Hacker News">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M0 24V0h24v24H0zM6.951 5.896l4.112 7.708v5.064h1.583v-4.972l4.148-7.799h-1.749l-2.457 4.875c-.372.745-.688 1.434-.688 1.434s-.297-.708-.651-1.434L8.831 5.896z"/></svg>
  </a>
  <button class="share-link share-copy" title="Copy link" onclick="
    navigator.clipboard.writeText('{{ share_url }}').then(function() {
      var btn = this;
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); }, 1500);
    }.bind(this));
  ">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13.849 4.22c-.684-1.626-3.014-1.626-3.698 0L8.397 8.5H4a1 1 0 0 0-.74 1.673l4 4.25a1 1 0 0 0 1.48 0l4-4.25A1 1 0 0 0 12 8.5H9.603l1.548-3.69zM10.151 19.78c.684 1.626 3.014 1.626 3.698 0L15.603 15.5H20a1 1 0 0 0 .74-1.673l-4-4.25a1 1 0 0 0-1.48 0l-4 4.25A1 1 0 0 0 12 15.5h2.397l-1.548 3.69z"/></svg>
    <svg class="share-copy__check" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </button>
</div>
